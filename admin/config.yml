backend:
  name: git-gateway
  branch: main

media_folder: ""
public_folder: ""

collections:
  - name: "blog"
    label: "Blog Posts"
    files:
      - file: "posts.json"
        label: "All Blog Posts"
        name: "posts"
        format: "json"
        fields:
          - label: "Posts List"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Slug (URL friendly, e.g. seo-guide)", name: "slug", widget: "string"}
              - {label: "Publish Date", name: "date", widget: "date"}
              - {label: "Description / Excerpt", name: "description", widget: "string", required: false}
              - {label: "Featured Image", name: "image", widget: "image", required: false}
              - {label: "Article Body", name: "body", widget: "markdown", required: false}
